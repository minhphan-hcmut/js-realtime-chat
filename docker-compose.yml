version: '3.8'

services:
  # 1. The Database Service
  mongodb:
    image: mongo:6.0 # Locking versions is safer than 'latest'
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # 2. The Web Interface Service
  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_URL: mongodb://root:password123@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false" # Set to true to password protect the GUI
    depends_on:
      - mongodb

# Define named volumes (cleaner than mapping to a specific local folder)
volumes:
  mongo-data: